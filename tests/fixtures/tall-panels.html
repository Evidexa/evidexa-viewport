<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tall Panels Fixture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden; /* body does NOT scroll — fixed-layout app */
      background: #1e1e2e;
      font-family: sans-serif;
    }
    .toolbar {
      height: 48px;
      background: #2a2a3e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: #fff;
      font-size: 14px;
    }
    .layout {
      display: flex;
      height: calc(100vh - 48px);
    }
    .left-panel {
      width: 300px;
      overflow-y: auto;
      overflow-x: hidden;
      background: #252535;
      border-right: 1px solid #3a3a4e;
      padding: 8px;
      flex-shrink: 0;
    }
    .right-panel {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: #1e1e2e;
      padding: 16px;
    }
    .list-item {
      height: 60px;
      background: #2e2e4e;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: #aaa;
      font-size: 13px;
    }
    .content-block {
      background: #252535;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="toolbar">Panel Composite Test</div>
  <div class="layout">
    <div class="left-panel" id="leftPanel">
      <!-- 40 items × 68px = 2720px of scrollable content -->
    </div>
    <div class="right-panel" id="rightPanel">
      <!-- 20 content blocks of ~120px each = ~2400px of scrollable content -->
    </div>
  </div>
  <script>
    const left = document.getElementById('leftPanel')
    for (let i = 1; i <= 40; i++) {
      const el = document.createElement('div')
      el.className = 'list-item'
      el.textContent = `Item ${i}`
      el.dataset.index = i
      left.appendChild(el)
    }
    const right = document.getElementById('rightPanel')
    for (let i = 1; i <= 20; i++) {
      const el = document.createElement('div')
      el.className = 'content-block'
      el.innerHTML = `<strong>Block ${i}</strong><br>Content block number ${i} with some text to fill space.`
      right.appendChild(el)
    }
  </script>
</body>
</html>
