<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tall Test Page</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fff; }
    .sticky-nav {
      position: sticky;
      top: 0;
      background: #1d2333;
      color: #fff;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      z-index: 100;
    }
    .content { padding: 20px; }
    .block {
      height: 200px;
      margin: 16px 0;
      background: #f4f6f9;
      border: 1px solid #d6dae3;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #1d2333;
    }
    .block:nth-child(even) { background: #e8f5f5; border-color: #18b5b3; }
  </style>
</head>
<body>
  <div class="sticky-nav">Evidexa Screenshot — Test Page (Sticky Navigation)</div>
  <div class="content">
    <div class="block">Section 1</div>
    <div class="block">Section 2</div>
    <div class="block">Section 3</div>
    <div class="block">Section 4</div>
    <div class="block">Section 5</div>
    <div class="block">Section 6</div>
    <div class="block">Section 7</div>
    <div class="block">Section 8</div>
    <div class="block">Section 9</div>
    <div class="block">Section 10</div>
    <div class="block">Section 11</div>
    <div class="block">Section 12</div>
    <div class="block">Section 13</div>
    <div class="block">Section 14</div>
    <div class="block">Section 15</div>
  </div>
</body>
</html>
